<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Power Query Quack 🦆</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header>
      <h1>🦆 Power Query Quack</h1>
      <p class="tagline">From M to DuckDB, one quack at a time.</p>
    </header>

    <main>
      <section id="upload" aria-label="Upload">
        <h2>1 · Power Query</h2>
        <p class="hint">
          Paste M code, a single <code>let … in …</code> query, or a section
          document (<code>shared Name = …;</code>). Or load a
          <code>.pq</code>/<code>.m</code>/<code>.txt</code> file.
        </p>
        <textarea id="source" spellcheck="false"
          placeholder="let&#10;  Source = Csv.Document(File.Contents(&quot;sales.csv&quot;)),&#10;  Filtered = Table.SelectRows(Source, each [Amount] > 100)&#10;in Filtered"></textarea>
        <input type="file" id="file" accept=".pq,.m,.txt" />
      </section>

      <section id="settings" aria-label="Settings">
        <h2>2 · Settings</h2>
        <div class="settings-grid">
          <label>Language
            <select id="language"></select>
          </label>
          <label>Target runtime
            <select id="runtime"></select>
          </label>
        </div>
        <button id="convert">Convert →</button>
      </section>

      <section id="results" aria-label="Results" hidden>
        <h2>3 · Results</h2>
        <div id="status-bar"></div>
        <div id="report"></div>
      </section>

      <section id="feedback" aria-label="Feedback" hidden>
        <h2 id="feedback-question">Was the conversion successful?</h2>
        <div class="feedback-buttons">
          <button data-verdict="correct">👍 Correct</button>
          <button data-verdict="incorrect">👎 Incorrect</button>
          <button data-verdict="needs_help">🛠 Help Me Fix It</button>
        </div>
        <p id="feedback-ack" hidden></p>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
